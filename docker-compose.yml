services:
  postgres:
    build:
      context: ../postgres-jsonlog
    command: &pg-json-logging
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_destination=jsonlog
      - -c
      - log_directory=log
      - -c
      - log_filename=postgresql
      - -c
      - log_rotation_age=0
      - -c
      - log_rotation_size=0
      - -c
      - log_truncate_on_rotation=off
    env_file:
      - ../auth-service/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth-database
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  agency-postgres:
    build:
      context: ../postgres-jsonlog
    command: *pg-json-logging
    env_file:
      - ../agency-service/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AGENCY_DB_PASSWORD}
      POSTGRES_DB: agency-database
    ports:
      - "5434:5432"
    volumes:
      - agency_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    expose:
      - "8081"
    env_file:
      - ../auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  agency-service:
    build:
      context: ..
      dockerfile: agency-service/Dockerfile
    # No host port mapping — reachable only via the api-gateway. This service
    # trusts the X-User-ID / X-User-Roles headers, so it must never be exposed
    # directly to the host.
    expose:
      - "8082"
    env_file:
      - ../agency-service/.env
    environment:
      DB_HOST: agency-postgres
      DB_PORT: 5432
    depends_on:
      agency-postgres:
        condition: service_healthy

  api-gateway:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - auth-service
      - agency-service

volumes:
  postgres_data:
  agency_postgres_data: